{% extends "base.html" %}

{% block content %}

<h2>Delete Experiment</h2>

<div class="alert alert-danger">

    <p>
        Are you sure you want to delete this experiment?
    </p>

    <p>
        <strong>{{ experiment.experiment_id }}</strong><br>
        {{ experiment.title }}
    </p>

</div>

<form method="POST">

    <button type="submit"
            class="btn btn-danger">
        Delete
    </button>

    <a href="{{ url_for('experiments.view_experiment', id=experiment.id) }}"
       class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
